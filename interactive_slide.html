<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Học Tương Tác: Phòng Tránh Đuối Nước</title>
    <!-- Outfit Google Font for a sleek modern design -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0A0E1A;
            --card-bg: rgba(20, 26, 46, 0.75);
            --navy-medium: #1C2541;
            --cyan-accent: #00E5FF;
            --coral-warning: #FF3B30;
            --teal-success: #00E676;
            --text-light: #F8FAFC;
            --text-muted: #A0AEC0;
            --border-glow: rgba(0, 229, 255, 0.2);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Presentation Container & Backgrounds --- */
        #presentation-wrapper {
            height: 100vh;
            min-height: 100vh;
            max-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            background-size: cover;
            background-position: center;
            transition: background-image 0.5s ease;
            overflow: hidden;
        }

        #presentation-wrapper.dark-slide-bg {
            background-image: 
                linear-gradient(rgba(11, 19, 43, 0.88), rgba(11, 19, 43, 0.88)),
                url('images/newsroom_dark_bg.png');
        }

        #presentation-wrapper.light-slide-bg {
            background-image: 
                linear-gradient(rgba(240, 244, 248, 0.48), rgba(240, 244, 248, 0.48)),
                url('images/newsroom_light_bg.png');
            color: var(--navy-medium);
        }

        /* --- Header / Top Banner --- */
        header {
            flex-shrink: 0;
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background-color: rgba(11, 19, 43, 0.9);
            color: var(--text-light);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .logo-badge {
            background: linear-gradient(135deg, var(--cyan-accent), #0077B6);
            color: var(--bg-dark);
            font-weight: 800;
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            font-size: 1rem;
            letter-spacing: 0.5px;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.25);
        }

        .logo-text {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .logo-text span {
            color: var(--cyan-accent);
        }

        .stage-indicator {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-light);
            background-color: rgba(255, 255, 255, 0.08);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
        }

        /* --- Slide Workspace --- */
        #slide-container {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 1.5rem 3rem;
            position: relative;
            overflow-y: auto;
            min-height: 0;
        }

        .slide-content-layout {
            width: 100%;
            max-width: 1200px;
            min-height: 480px;
            animation: fadeIn 0.3s ease-out;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin: auto;
        }

        /* --- Navigation Controller at Bottom --- */
        #nav-controls {
            flex-shrink: 0;
            background-color: rgba(11, 19, 43, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            color: var(--text-light);
        }

        .nav-btn {
            background-color: var(--navy-medium);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-light);
            padding: 0.6rem 1.4rem;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .nav-btn:hover:not(:disabled) {
            background-color: rgba(0, 229, 255, 0.2);
            border-color: var(--cyan-accent);
            color: var(--cyan-accent);
            transform: translateY(-1px);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .nav-btn.primary-action {
            background-color: var(--cyan-accent);
            color: var(--bg-dark);
            border-color: var(--cyan-accent);
            font-weight: 700;
        }

        .nav-btn.primary-action:hover {
            background-color: #00B4D8;
            color: var(--text-light);
        }

        .progress-text {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .progress-text span {
            color: var(--cyan-accent);
        }

        /* --- Sidebar Slide Selector Menu --- */
        #slide-menu {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100vh;
            background-color: rgba(11, 19, 43, 0.98);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            z-index: 200;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            color: var(--text-light);
        }

        #slide-menu.open {
            left: 0;
        }

        .menu-header {
            padding: 1rem 1.2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .menu-close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.4rem;
            cursor: pointer;
        }

        .menu-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.8rem;
        }

        .menu-item {
            padding: 0.5rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.35rem;
            border: 1px solid transparent;
        }

        .menu-item:hover {
            background-color: rgba(255,255,255,0.04);
            color: var(--cyan-accent);
        }

        .menu-item.active {
            background-color: rgba(0, 229, 255, 0.1);
            color: var(--cyan-accent);
            border-color: rgba(0, 229, 255, 0.2);
            font-weight: 600;
        }

        #menu-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 150;
            display: none;
        }

        #menu-backdrop.open {
            display: block;
        }

        /* --- UI Components for General Slide Layouts --- */
        .slide-title-bar {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 0.6rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .light-slide-bg .slide-title-bar {
            border-bottom-color: rgba(28, 37, 65, 0.15);
        }

        /* welcome / role-intro split style */
        .split-layout {
            display: grid;
            grid-template-columns: 1.15fr 0.85fr;
            gap: 2rem;
            align-items: center;
        }

        .left-column {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .right-column {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .visual-img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            border: 2px solid rgba(255,255,255,0.06);
        }

        .light-slide-bg .visual-img {
            box-shadow: 0 8px 25px rgba(28, 37, 65, 0.15);
            border-color: rgba(28, 37, 65, 0.05);
        }

        /* Cards styles */
        .content-card {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .light-slide-bg .content-card {
            background-color: white;
            border-color: rgba(28, 37, 65, 0.1);
            color: var(--navy-medium);
        }

        .card-header {
            font-size: 1rem;
            font-weight: 700;
            color: var(--cyan-accent);
            margin-bottom: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .light-slide-bg .card-header {
            color: #0077B6;
        }

        /* Bullet lists styles */
        .bullet-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .bullet-list li {
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
            font-size: 1.05rem;
            line-height: 1.5;
        }

        /* Dynamic Grid layouts */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        /* How to Steps layout */
        .step-card {
            background-color: white;
            border: 2px solid var(--cyan-accent);
            border-radius: 12px;
            padding: 1.5rem;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .step-number {
            width: 40px;
            height: 40px;
            background-color: var(--cyan-accent);
            color: var(--bg-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
        }

        .step-text {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--navy-medium);
            line-height: 1.5;
        }

        /* Transition Slide styles */
        .transition-layout {
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            align-items: center;
        }

        .explored-box {
            font-size: 1.3rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .explored-box span {
            color: var(--text-light);
            font-weight: 700;
            display: block;
            font-size: 1.8rem;
            margin-top: 0.5rem;
        }

        .next-question-box {
            font-size: 1.3rem;
            color: var(--coral-warning);
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-top: 1.5rem;
            width: 100%;
        }

        .next-question-box span {
            color: var(--cyan-accent);
            font-weight: 700;
            display: block;
            font-size: 2.2rem;
            margin-top: 0.5rem;
        }

        /* Debrief Slide styles */
        .debrief-layout {
            display: grid;
            grid-template-columns: 1.15fr 0.85fr;
            gap: 2rem;
        }

        .debrief-callout {
            background-color: #E0FBC0;
            border: 2px solid var(--teal-success);
            border-radius: 12px;
            padding: 1.8rem;
            color: var(--navy-medium);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .debrief-callout-header {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--teal-success);
            letter-spacing: 0.5px;
        }

        .debrief-callout-text {
            font-size: 1.25rem;
            font-weight: 700;
            line-height: 1.6;
        }

        /* Workspace General Layout */
        .workspace-layout {
            display: grid;
            grid-template-columns: 1.15fr 0.85fr;
            gap: 2rem;
        }

        .workspace-right-info {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .time-badge {
            background-color: var(--coral-warning);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1rem;
            align-self: flex-start;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        /* --- Native Table Overlays --- */
        .slide-table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            margin-top: 1rem;
        }

        .slide-table th {
            background-color: var(--navy-medium);
            color: white;
            padding: 0.8rem 1rem;
            font-weight: 700;
            font-size: 0.95rem;
            text-align: left;
        }

        .slide-table td {
            background-color: white;
            color: var(--navy-medium);
            padding: 0.8rem 1rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            font-size: 0.9rem;
            line-height: 1.4;
        }

        /* --- Custom Interactive Widget Styles Inside Slides --- */
        .interactive-widget-box {
            width: 100%;
            min-height: 380px;
        }

        /* Tin Nóng Clue Hunt */
        .news-hunt-screen {
            background-color: rgba(11, 19, 43, 0.05);
            border: 1px solid rgba(28, 37, 65, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            position: relative;
        }
        .clickable-word {
            display: inline-block;
            cursor: pointer;
            padding: 0.1rem 0.3rem;
            border-radius: 4px;
            transition: var(--transition);
            border-bottom: none;
        }
        .clickable-word:hover {
            background-color: rgba(0, 229, 255, 0.15);
            color: #0077B6;
        }
        .clickable-word.selected {
            background-color: rgba(255, 90, 95, 0.25);
            color: var(--coral-warning);
            border-bottom: 2px solid var(--coral-warning);
            font-weight: 700;
        }
        .clue-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            background-color: rgba(28, 37, 65, 0.05);
            border: 1px solid rgba(28, 37, 65, 0.1);
            font-size: 0.85rem;
            font-weight: 600;
        }
        .clue-badge.found {
            background-color: rgba(0, 230, 118, 0.15);
            border-color: var(--teal-success);
            color: #008f3a;
        }

        /* Witness Matching Widget */
        .witness-deck {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .dossier-paper {
            background-color: white;
            color: var(--navy-medium);
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-left: 5px solid var(--cyan-accent);
        }
        .dossier-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 0.6rem;
            color: var(--navy-medium);
        }
        .dossier-quote {
            font-style: italic;
            line-height: 1.5;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }
        .witness-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .folder-tab-btn {
            background-color: rgba(28, 37, 65, 0.04);
            border: 1px solid rgba(28, 37, 65, 0.1);
            padding: 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            font-weight: 600;
            transition: var(--transition);
        }
        .folder-tab-btn:hover, .folder-tab-btn.active {
            background-color: var(--navy-medium);
            color: white;
            border-color: var(--navy-medium);
        }

        /* Buoyancy Lab */
        .lab-panel-grid {
            display: grid;
            grid-template-columns: 0.8fr 1.2fr;
            gap: 1.5rem;
            height: 380px;
        }
        .aquarium {
            background: linear-gradient(to bottom, #1C2541 0%, #0077B6 100%);
            border: 2px solid var(--cyan-accent);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: flex-end;
            flex-direction: column;
        }
        .aquarium-water {
            height: 60%;
            background: rgba(0, 180, 216, 0.35);
            border-top: 3px solid var(--cyan-accent);
            position: relative;
        }
        .draggable-lab-item {
            background-color: white;
            border: 1px solid rgba(28, 37, 65, 0.1);
            padding: 0.6rem;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            transition: var(--transition);
        }
        .draggable-lab-item:hover {
            border-color: var(--cyan-accent);
            transform: translateY(-1px);
        }
        .draggable-lab-item.tested {
            opacity: 0.3;
            pointer-events: none;
        }
        .lab-sprite {
            position: absolute;
            font-size: 2.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 15;
            transition: all 1.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform: translateX(-50%);
        }
        .lab-sprite span.label {
            font-size: 0.65rem;
            background-color: var(--bg-dark);
            color: white;
            padding: 0.1rem 0.3rem;
            border-radius: 4px;
            white-space: nowrap;
        }
        .lab-sprite.float {
            animation: floatBob 3s ease-in-out infinite;
        }
        @keyframes floatBob {
            0% { transform: translateY(0) translateX(-50%); }
            50% { transform: translateY(-8px) translateX(-50%); }
            100% { transform: translateY(0) translateX(-50%); }
        }

        /* Certificate Widget */
        .interactive-cert-box {
            display: grid;
            grid-template-columns: 0.9fr 1.1fr;
            gap: 1.5rem;
        }
        .interactive-cert-paper {
            background-color: white;
            color: var(--navy-medium);
            padding: 0.3rem;
            border-radius: 12px;
            text-align: center;
            height: 395px;
            max-height: 395px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            position: relative;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        /* Premium Reporter Certificate Styles */
        .cert-border-outer {
            border: 6px solid var(--navy-medium) !important;
            padding: 3px;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-radius: 8px;
            background: radial-gradient(circle, #fffdf9 0%, #f6edd8 100%) !important;
        }
        .cert-border-inner {
            border: 1.5px solid #d4af37 !important;
            padding: 0.6rem 0.8rem;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            position: relative;
            background: transparent !important;
        }
        /* Gold corner brackets styling */
        .cert-corner-bracket {
            position: absolute;
            width: 15px;
            height: 15px;
            border-color: #d4af37 !important;
            pointer-events: none;
            z-index: 2;
        }
        .cert-corner-bracket.top-left {
            top: 0;
            left: 0;
            border-top: 2px solid;
            border-left: 2px solid;
        }
        .cert-corner-bracket.top-right {
            top: 0;
            right: 0;
            border-top: 2px solid;
            border-right: 2px solid;
        }
        .cert-corner-bracket.bottom-left {
            bottom: 0;
            left: 0;
            border-bottom: 2px solid;
            border-left: 2px solid;
        }
        .cert-corner-bracket.bottom-right {
            bottom: 0;
            right: 0;
            border-bottom: 2px solid;
            border-right: 2px solid;
        }
        /* Gold Medal styling */
        .cert-medal-badge {
            position: absolute;
            left: 0.6rem;
            top: 0.6rem;
            pointer-events: none;
            z-index: 2;
        }
        .cert-medal-badge svg {
            width: 45px;
            height: 45px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
        }
        .cert-header {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .cert-logo {
            font-family: 'Outfit', sans-serif;
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--navy-medium);
            letter-spacing: 2px;
            margin-bottom: 0.1rem;
            border-bottom: 1.5px solid #d4af37;
            padding-bottom: 0.1rem;
            width: 70%;
        }
        .cert-logo span {
            color: #b91c1c;
        }
        .cert-main-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.05rem;
            font-weight: 950;
            color: #b91c1c;
            letter-spacing: 0.5px;
            line-height: 1.2;
            margin-top: 0.15rem;
        }
        .cert-sub-title {
            font-size: 0.55rem;
            color: var(--navy-medium);
            font-weight: 800;
            margin-top: 0.05rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .cert-recipient-section {
            text-align: center;
            margin: 0.2rem 0;
        }
        .cert-certify-text {
            font-size: 0.65rem;
            font-style: italic;
            color: #4a5568;
            font-weight: 600;
        }
        .cert-name {
            font-family: 'Itim', sans-serif;
            font-size: 1.4rem;
            font-weight: 800;

    <script>
        // --- HELPER FUNCTION: MAP ICONS TO TEXT ---
        function map_icon_to_text(text) {
            if (!text) return '';
            let cleaned = text.trim();
            const icons = ["🎯", "📋", "🌿", "🛡️", "🦺", "🏊", "🌀", "🛶", "🔍", "💡", "📢", "📓", "✔", "⭐", "💭", "📜", "👁️", "🚣", "🗣️", "❓", "📚", "🛠️", "⏱️", "🚨", "📺", "👉", "⚡", "🎤", "🔬", "🧪", "🏆", "❌", "✍️", "📡", "🎉", "🎖️", "📂"];
            if (icons.some(icon => cleaned.startsWith(icon))) {
                return cleaned;
            }
            
            let lower = cleaned.toLowerCase();
            // Remove starting bullets if they are present in content text
            if (cleaned.startsWith("•") || cleaned.startsWith("-")) {
                cleaned = cleaned.substring(1).trim();
                lower = cleaned.toLowerCase();
            }
            
            if (lower.includes("kiến thức") || lower.includes("học tập")) return "📚 " + cleaned;
            if (lower.includes("kỹ năng") || lower.includes("thực hành")) return "🛠️ " + cleaned;
            if (lower.includes("thái độ") || lower.includes("ý thức")) return "🌿 " + cleaned;
            if (lower.includes("nguy cơ") || lower.includes("tai nạn") || lower.includes("nguy hiểm")) return "🚨 " + cleaned;
            if (lower.includes("phòng tránh") || lower.includes("bảo vệ") || lower.includes("an toàn")) return "🛡️ " + cleaned;
            if (lower.includes("vật nổi") || lower.includes("phao")) return "🦺 " + cleaned;
            if (lower.includes("nhiệm vụ")) return "📋 " + cleaned;
            if (lower.includes("nhân chứng") || lower.includes("phỏng vấn")) return "🎤 " + cleaned;
            if (lower.includes("khảo sát") || lower.includes("điều tra") || lower.includes("tìm hiểu")) return "🔍 " + cleaned;
            if (lower.includes("kết luận") || lower.includes("thông điệp") || lower.includes("báo cáo")) return "📢 " + cleaned;
            
            return "🔹 " + cleaned;
        }

        // --- CUSTOM ALERT DIALOG POPUP ---
        function showCustomAlert(message, title = "Thông báo từ Tòa soạn", icon = "💡", onCloseCallback = null) {
            const backdrop = document.getElementById('custom-alert-backdrop');
            const alertBox = document.getElementById('custom-alert-box');
            
            alertBox.querySelector('.alert-title').innerText = title;
            alertBox.querySelector('.alert-message').innerHTML = message;
            alertBox.querySelector('.alert-icon').innerText = icon;
            
            backdrop.style.display = 'block';
            setTimeout(() => backdrop.classList.add('show'), 10);
            
            alertBox.style.display = 'flex';
            setTimeout(() => alertBox.classList.add('show'), 10);
            
            alertBox.querySelector('.alert-close-btn').onclick = function() {
                closeCustomAlert();
                if (onCloseCallback) onCloseCallback();
            };
        }

        // Add key listener for closing custom alert modal on Enter/Escape
        document.addEventListener('keydown', function(e) {
            const alertBox = document.getElementById('custom-alert-box');
            if (alertBox && alertBox.style.display === 'flex' && (e.key === 'Enter' || e.key === 'Escape')) {
                const btn = alertBox.querySelector('.alert-close-btn');
                if (btn) btn.click();
            }
        });

            const backdrop = document.getElementById('custom-alert-backdrop');
            const alertBox = document.getElementById('custom-alert-box');

        function initPresentation() {
            if (currentLesson === null) {
                renderLessonSelectorHub();
            } else {
                initPresentationView();
            }
            
            // Key listeners
            document.addEventListener('keydown', function(e) {
                if (currentLesson === null) return;
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                if (e.key === 'ArrowRight') {
                    goToNextSlide();
                } else if (e.key === 'ArrowLeft') {
                    goToPrevSlide();
                }
            });
        }

                return;
            }
            updateCertTextWidget();
            
            // Trigger confetti
            const canvas = document.getElementById('confetti-canvas-widget');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            
            let particles = [];
            const colors = ['#00E5FF', '#FF3B30', '#00E676', '#FFD700', '#FFFFFF'];
            
            for (let i = 0; i < 70; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height - 20,
                    size: Math.random() * 4 + 3,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    speedX: (Math.random() - 0.5) * 6,
                    speedY: -Math.random() * 8 - 4,
                    gravity: 0.18,
                    opacity: 1
                });
            }
            
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let alive = false;
                
                particles.forEach(p => {
                    p.x += p.speedX;
                    p.y += p.speedY;
                    p.speedY += p.gravity;
                    p.opacity -= 0.015;
                    
                    if (p.opacity > 0) {
                        alive = true;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fillStyle = p.color;
                        ctx.globalAlpha = p.opacity;
                        ctx.fill();
                    }
                });
                
                if (alive) {
                    requestAnimationFrame(animate);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }
            
            animate();
            
            showCustomAlert(`Chúc mừng Phóng viên nhí <b>${name}</b> đã hoàn thành xuất sắc khóa tập huấn và ký Cam kết An toàn Sông nước!<br><br>Chứng nhận điện tử đã được ghi nhận trên hệ thống Nova News. Hãy nhấn ĐÓNG để xem tổng kết bài học.`, "Ký cam kết thành công", "🎉", () => goToNextSlide());
        }

        function handleBatchUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const buffer = e.target.result;
                let text = "";
                try {
                    // Try decoding as strict UTF-8 first
                    const utf8Decoder = new TextDecoder('utf-8', { fatal: true });
                    text = utf8Decoder.decode(buffer);
                } catch (err) {
                    // Fallback to Windows-1258 (Vietnamese ANSI) if UTF-8 fails
                    const winDecoder = new TextDecoder('windows-1258');
                    text = winDecoder.decode(buffer);
                }
                
                // Split by newlines or commas, filter out empty lines
                batchNamesList = text.split(/[\r\n,]+/)
                                     .map(name => name.trim())
                                     .filter(name => name.length > 0);

                const countLabel = document.getElementById('batch-count-label');
                countLabel.innerText = `Đã nạp: ${batchNamesList.length}`;
                countLabel.style.color = '#00E676';

                const printBtn = document.getElementById('btn-batch-print');
                if (batchNamesList.length > 0) {
                    printBtn.disabled = false;
                    showCustomAlert(`Đã nạp thành công danh sách gồm <b>${batchNamesList.length} học sinh</b>.<br><br>Nhấn nút <b>"In hàng loạt"</b> để bắt đầu xuất bản chứng nhận.`, "Nạp danh sách thành công", "📂");
                } else {
                    printBtn.disabled = true;
                    showCustomAlert("Danh sách trống hoặc định dạng không hợp lệ. Vui lòng kiểm tra lại!", "Lỗi định dạng", "❌");
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function signT2Commitment() {
            const person = document.getElementById('t2-remind-person').value.trim();
            const reason = document.getElementById('t2-remind-reason').value.trim();
            
            if (person === '' || reason === '') {
                showCustomAlert("Vui lòng nhập tên người muốn chia sẻ và lý do chia sẻ trước khi ký cam kết!", "Thiếu thông tin cam kết", "✍️");
                return;
            }
            
            // Trigger confetti
            const canvas = document.getElementById('t2-confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            
            let particles = [];
            const colors = ['#FF9F43', '#FF3B30', '#00E676', '#FFD700', '#FFFFFF'];
            
            for (let i = 0; i < 70; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height - 20,
                    size: Math.random() * 4 + 3,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    speedX: (Math.random() - 0.5) * 6,
                    speedY: -Math.random() * 8 - 4,
                    gravity: 0.18,
                    opacity: 1
                });
            }
            
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let alive = false;
                
                particles.forEach(p => {
                    p.x += p.speedX;
                    p.y += p.speedY;
                    p.speedY += p.gravity;
                    p.opacity -= 0.015;
                    
                    if (p.opacity > 0) {
                        alive = true;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fillStyle = p.color;
                        ctx.globalAlpha = p.opacity;
                        ctx.fill();
                    }
                });
                
                if (alive) {
                    requestAnimationFrame(animate);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }
            
            animate();
            
            showCustomAlert(`Chúc mừng Biên tập viên đã ký cam kết hành động! Nhóm hãy luôn chia sẻ kiến thức này để giúp <b>${person}</b> và mọi người xung quanh luôn an toàn sông nước nhé!`, "Ký cam kết thành công", "🎉", () => goToNextSlide());
        }
